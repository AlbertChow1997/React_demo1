<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script type="text/javascript">
    // Spread syntax expands array items into another array or function call.
    let arr1=[1,3,5,7,9]
    let arr2=[2,4,6,8,10]

    let arr3 = [...arr1, ...arr2]
    console.log(arr3) // [1,3,5,7,9,2,4,6,8,10]
    console.log(...arr1) // 1 3 5 7 9
    console.log(...arr2) // 2 4 6 8 10

    // Rest parameters gather any number of arguments into one array.
    function sum(...numbers){
      return numbers.reduce((preValue, currentValue)=>{
        return preValue + currentValue
      })
    }
    console.log(sum(1,2,3,4,5)) // 15
    // Spread can also clone an object and override selected fields.
    let person = {
      name:'Tom',
      age:20,
      gender:'male'
    }

    let person2 = {...person, name:'Lily'}
    console.log(person)
    console.log(person2)

    //combination of spread operator and object destructuring
    let person3 = {...person, name:'Jack', age:30}
    console.log(person3)
  </script>
  
</body>
</html>
