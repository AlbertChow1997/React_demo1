<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Document</title>
</head>
<body>
  <button id="btn">Click me</button>
  <button id="btn2">Click me too</button>
  <button onclick="demo()">Click me 3</button>

  <script>
    // addEventListener is the standard way to attach one or more handlers.
    const btn = document.getElementById('btn')
    btn.addEventListener('click', function(){
      alert('Button 1 clicked')
    })

    // Directly assigning onclick replaces any previous onclick handler.
    const btn2 = document.getElementById('btn2')
    btn2.onclick = () => {
      alert('Button 2 clicked')
    }

    // Inline HTML events call globally available functions by name.
    function demo(){
      alert('Button 3 clicked')
    }
  </script>
  
</body>
</html>
