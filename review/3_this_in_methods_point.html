<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Document</title>
</head>
<body>
  <script type="text/javascript">
    // Class methods depend on how they are called to decide what "this" is.
    class Person{
      constructor(name, age){
        this.name = name
        this.age = age
      }
      study(){
        console.log(this)
      }
    }

    const p1 = new Person('Alice', 30)
    p1.study() // When called through p1, "this" points to the instance.
    const x = p1.study // Saving the method alone removes its object context.
    x() // In strict mode, calling it directly makes "this" become undefined.
  </script>
  
</body>
</html>
