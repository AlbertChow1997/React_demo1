<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>props2</title>
</head>
<body>
  <!-- prepare a container -->
  <div id="test1" ></div>
  <div id="test2" ></div>
  <div id="test3" ></div>

  <!-- import react core library -->
  <script type="text/javascript" src = "../js/react.development.js"></script>
  <!-- import dom library -->
  <script type="text/javascript" src = "../js/react-dom.development.js"></script>
  <!-- import babel to translate jsx to js -->
  <script type="text/javascript" src = "../js/babel.min.js"></script>
  <!-- import prop-types-->
  <script type="text/javascript" src = "../js/prop-types.js"></script>

  <script type="text/babel">
    // Props are values passed from a parent when a component is used.
    class Person extends React.Component{

      render(){
        // Destructure props to make the JSX easier to read.
        const {name, gender, age} = this.props

				// Props are read-only, so we cannot modify them. We can only use them to calculate the output.

        return (
          <ul>
            <li>Name: {name}</li>
            <li>Gender: {gender}</li>
            <li>Age: {age}</li>
          </ul>
        )
      }
			static propTypes = {
      	name:PropTypes.string.isRequired,
				gender:PropTypes.string,
				age:PropTypes.number,
				speak:PropTypes.func
    	}

			// Default props are used when the parent does not provide a value.
			static defaultProps = {
				gender:'unknown',
				age:18
			}
    }
    

		

    // These first two renders pass props one by one.
    ReactDOM.render(<Person name="Tom" speak={speak}/>, document.getElementById('test1'))
    ReactDOM.render(<Person name="Lily" gender="female" age={19}/>, document.getElementById('test2'))
    const p = {name:'Jack', gender:'male', age:30}

    // Spread syntax copies object fields into individual props.
    ReactDOM.render(<Person {...p}/>, document.getElementById('test3'))
    
		function speak(){
			alert('Hello')
		}


  </script>
  
</body>
</html>
