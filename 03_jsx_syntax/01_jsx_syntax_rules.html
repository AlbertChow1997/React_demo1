<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JSX Syntax Rules</title>

  <style>
    .title {
      background-color: orange;
      width: 200px;
    }
  </style>
</head>
<body>
  <!-- prepare a container -->
  <div id="test" ></div>

  <!-- import react core library -->
  <script type="text/javascript" src = "../js/react.development.js"></script>
  <!-- import dom library -->
  <script type="text/javascript" src = "../js/react-dom.development.js"></script>
  <!-- import babel to translate jsx to js -->
  <script type="text/javascript" src = "../js/babel.min.js"></script>

  <script type="text/babel">
  // Values can be injected into JSX with {}.
  const myId = "atguigu";
  const myData = "Hello, rEaCt";


    // JSX uses className for CSS classes and style receives a JS object.
    const VDOM = (
      <h2 className="title" id={myId}>
        <span style={{color: 'red', fontSize: '20px'}}>{myData}</span>
      </h2>

    )
    // Render the JSX result into the page.
    ReactDOM.render(VDOM, document.getElementById("test"));
  </script>
  
</body>
</html>
