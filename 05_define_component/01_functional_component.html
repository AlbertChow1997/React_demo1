<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>1_Functional_Component</title>
</head>
<body>
  <!-- prepare a container -->
  <div id="test" ></div>

  <!-- import react core library -->
  <script type="text/javascript" src = "../js/react.development.js"></script>
  <!-- import dom library -->
  <script type="text/javascript" src = "../js/react-dom.development.js"></script>
  <!-- import babel to translate jsx to js -->
  <script type="text/javascript" src = "../js/babel.min.js"></script>

  <script type="text/babel">
    // A functional component is just a function that returns JSX.
    function MyComponent(){
      return <h2>I'm a functional component</h2>
    }
    // Custom components are used as JSX tags.
    ReactDOM.render(<MyComponent/>, document.getElementById("test"));
    
  </script>
  
</body>
</html>
