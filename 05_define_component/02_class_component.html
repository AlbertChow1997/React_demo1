<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>2_Class_Component</title>
</head>
<body>
  <!-- prepare a container -->
  <div id="test" ></div>

  <!-- import react core library -->
  <script type="text/javascript" src = "../js/react.development.js"></script>
  <!-- import dom library -->
  <script type="text/javascript" src = "../js/react-dom.development.js"></script>
  <!-- import babel to translate jsx to js -->
  <script type="text/javascript" src = "../js/babel.min.js"></script>

  <script type="text/babel">
    // A class component must inherit from React.Component.
    class MyComponent extends React.Component{
      // React calls render() to know what UI this component should display.
      render(){
        return <h2>I'm a class component</h2>
      }
    }



  </script>
  
</body>
</html>
