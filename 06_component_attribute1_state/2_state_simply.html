<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>state</title>
</head>
<body>
  <!-- prepare a container -->
  <div id="test" ></div>

  <!-- import react core library -->
  <script type="text/javascript" src = "../js/react.development.js"></script>
  <!-- import dom library -->
  <script type="text/javascript" src = "../js/react-dom.development.js"></script>
  <!-- import babel to translate jsx to js -->
  <script type="text/javascript" src = "../js/babel.min.js"></script>

  <script type="text/babel">
    // Public class fields let us define state without writing a constructor.
    class Weather extends React.Component{

      state = {isHot:true, wind:'light'}
      render() {
        const {isHot, wind} = this.state
        // Arrow-function handlers keep the correct "this" automatically.
        return <h1 onClick={this.changeWeather}>Today's weather is {this.state.isHot ? 'hot' : 'cool'}, {wind}</h1>
      }

      // Using an arrow function here means "this" is always the component instance.
      // Self-defining method should use arrow function, otherwise "this" will be undefined when the method is called as an event handler.
      changeWeather = ()=>{
        // setState tells React to update the state and render again.
        const isHot = this.state.isHot
        this.setState({isHot:!isHot})
      }
    }
    // Mount the component into the page.
    ReactDOM.render(<Weather/>, document.getElementById('test'))



  </script>
  
</body>
</html>
