<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>state</title>
</head>
<body>
  <!-- prepare a container -->
  <div id="test" ></div>

  <!-- import react core library -->
  <script type="text/javascript" src = "../js/react.development.js"></script>
  <!-- import dom library -->
  <script type="text/javascript" src = "../js/react-dom.development.js"></script>
  <!-- import babel to translate jsx to js -->
  <script type="text/javascript" src = "../js/babel.min.js"></script>

  <script type="text/babel">
    class Weather extends React.Component{
      constructor(props){
        super(props)
        this.state = {isHot:true}
      }

      render() {
        console.log(this)
        return <h1 onClick={demo}>Today's weather is {this.state.isHot ? 'hot' : 'cool'}</h1>
      }

      ChangeWeather(){
        this.setState({isHot:!this.state.isHot})
      }
    }
    ReactDOM.render(<Weather weather="sunny"/>, document.getElementById('test'))



  </script>
  
</body>
</html>
