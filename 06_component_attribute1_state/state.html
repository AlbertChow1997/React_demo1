<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>state</title>
</head>
<body>
  <!-- prepare a container -->
  <div id="test" ></div>

  <!-- import react core library -->
  <script type="text/javascript" src = "../js/react.development.js"></script>
  <!-- import dom library -->
  <script type="text/javascript" src = "../js/react-dom.development.js"></script>
  <!-- import babel to translate jsx to js -->
  <script type="text/javascript" src = "../js/babel.min.js"></script>

  <script type="text/babel">
    class Weather extends React.Component{
      constructor(props){
        super(props)
        this.state = {isHot:true, wind:'light'}
        this.changeWeather = this.changeWeather.bind(this)
      }
      //render will be called at the first time when the component is mounted, and will be called again when the state is updated
      //the total times is 1 + the times of state update
      render() {
        const {isHot, wind} = this.state
        return <h1 onClick={this.changeWeather}>Today's weather is {this.state.isHot ? 'hot' : 'cool'}, {wind}</h1>
      }

      //changeWeather is a method to update the state, and it will be called when the h1 is clicked
      changeWeather(){
        const {isHot} = this.state.isHot
        this.setState({isHot:!this.state.isHot})
      }
    }
    ReactDOM.render(<Weather weather="sunny"/>, document.getElementById('test'))



  </script>
  
</body>
</html>
